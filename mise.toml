min_version = "2024.1.0"

[tasks.setup]
description = "Install all deps (dev + forecast + app)"
run = "uv sync --extra dev --extra forecast --extra app"

[tasks.test]
description = "Run the test suite"
run = "uv run pytest -q"

[tasks.lint]
description = "Ruff check"
run = "uv run ruff check src tests apps"

[tasks.fmt]
description = "Ruff auto-fix + format"
run = "uv run ruff check --fix src tests apps && uv run ruff format src tests apps"

[tasks.typecheck]
description = "mypy"
run = "uv run mypy src"

[tasks.check]
description = "Lint + typecheck + test"
depends = ["lint", "typecheck", "test"]

[tasks.map]
description = "Render the Weather domain as a 3D WebGL map (default UK; --city london/nyc/tokyo)"
run = "uv run python apps/demo_weather.py {{arg(name='args', default='')}}"

[tasks.twin]
description = "Render the multi-domain city twin (Weather + Energy) -> <city>_twin_3d.html"
run = "uv run --extra forecast python apps/demo_twin.py {{arg(name='args', default='')}}"

[tasks.verify-map]
description = "Render the SP5 verification error map (forecast -> verify -> 3D map)"
run = "uv run --extra forecast python apps/demo_verify.py {{arg(name='args', default='')}}"

[tasks.serve]
description = "Serve the live twin — loads tiles around a movable centre (http://127.0.0.1:8000)"
run = "uv run --extra app python apps/serve.py"
